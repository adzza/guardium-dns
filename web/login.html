<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <title>Guardium DNS — Sign in</title>
  <meta name="description" content="Guardium DNS — parental controls for Technitium DNS." />
  <meta name="application-name" content="Guardium DNS" />
  <meta name="apple-mobile-web-app-title" content="Guardium" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/styles.css" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="apple-touch-icon" href="/assets/favicon.svg" />
  <meta name="theme-color" content="#6366f1" />
</head>
<body class="min-h-screen text-slate-100 flex items-center justify-center px-4">
  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div class="absolute -top-32 -left-32 w-[40rem] h-[40rem] rounded-full bg-indigo-600/30 blur-3xl"></div>
    <div class="absolute top-1/3 -right-40 w-[36rem] h-[36rem] rounded-full bg-fuchsia-600/20 blur-3xl"></div>
    <div class="absolute -bottom-40 left-1/3 w-[36rem] h-[36rem] rounded-full bg-sky-500/15 blur-3xl"></div>
  </div>

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-fuchsia-500 shadow-2xl shadow-indigo-500/40 mb-4">
        <svg class="w-9 h-9 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 21l-7.5-4.33V7.33L12 3l7.5 4.33v9.34L12 21z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.5 12.5l1.8 1.8 3.7-4" />
        </svg>
      </div>
      <h1 class="text-2xl font-semibold tracking-tight">Guardium DNS</h1>
      <p class="text-xs uppercase tracking-[0.18em] text-indigo-300/80 mt-2">Parental controls for Technitium DNS</p>
      <p class="text-sm text-slate-400 mt-3">Sign in with your Technitium admin account</p>
    </div>
    <form id="login-form" class="bg-slate-900/70 backdrop-blur-xl ring-1 ring-white/5 rounded-2xl p-6 shadow-2xl shadow-black/40 space-y-4">
      <label class="block">
        <span class="text-xs uppercase tracking-wider text-slate-400">Username</span>
        <input name="username" autocomplete="username" required
               class="mt-1 w-full rounded-lg bg-slate-800/70 border border-slate-700 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-500/40 outline-none px-3 py-2 transition" />
      </label>
      <label class="block">
        <span class="text-xs uppercase tracking-wider text-slate-400">Password</span>
        <input name="password" type="password" autocomplete="current-password" required
               class="mt-1 w-full rounded-lg bg-slate-800/70 border border-slate-700 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-500/40 outline-none px-3 py-2 transition" />
      </label>
      <div id="login-error" class="hidden text-sm text-rose-300 bg-rose-500/10 ring-1 ring-rose-400/30 rounded-lg px-3 py-2"></div>
      <button type="submit"
              class="w-full inline-flex items-center justify-center gap-2 bg-gradient-to-br from-indigo-500 to-fuchsia-500 hover:from-indigo-400 hover:to-fuchsia-400 active:from-indigo-600 active:to-fuchsia-600 text-white font-medium px-4 py-2.5 rounded-lg shadow-lg shadow-indigo-500/30 transition">
        Sign in
      </button>
    </form>
    <p class="text-center text-xs text-slate-500 mt-6">
      Talks to Technitium DNS at <code class="text-slate-300">127.0.0.1:5380</code>.
      Standalone of Technitium itself.
    </p>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errBox = document.getElementById('login-error');
    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      errBox.classList.add('hidden');
      const fd = new FormData(form);
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({username: fd.get('username'), password: fd.get('password')}),
        });
        if (!r.ok) {
          const data = await r.json().catch(() => ({}));
          errBox.textContent = data.detail || `Sign in failed (${r.status})`;
          errBox.classList.remove('hidden');
          return;
        }
        window.location.href = '/';
      } catch (e) {
        errBox.textContent = e.message || 'Network error';
        errBox.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
